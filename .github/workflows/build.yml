name: Build APK & IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  apk:
    name: Build APK (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FinTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ipa:
    name: Build IPA (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -allowProvisioningUpdates build CODE_SIGNING_ALLOWED=NO
          mkdir -p build
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -allowProvisioningUpdates archive -archivePath build/FinTrack.xcarchive CODE_SIGNING_ALLOWED=NO
          xcodebuild -exportArchive -archivePath build/FinTrack.xcarchive -exportPath build/FinTrack -exportOptionsPlist /dev/null CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FinTrack-IPA
          path: ios/build/FinTrack/*.ipa
