<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FinTrack" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <title>FinTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      background: #0d0d1a;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
    }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      background: #0d0d1a;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #e2e8f0; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
    .loader {
      width: 32px; height: 32px;
      border: 3px solid #1e293b;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
  </style>
  <script>
    // Try to load the actual app from the server
    window.addEventListener('DOMContentLoaded', function() {
      var serverUrl = (function() {
        // Check if Capacitor is available
        if (typeof Capacitor !== 'undefined') {
          // In native app, try to connect to the configured server
          return window.location.origin;
        }
        return window.location.origin;
      })();

      var xhr = new XMLHttpRequest();
      xhr.open('GET', serverUrl, true);
      xhr.timeout = 10000;
      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 400) {
          // Server is reachable, redirect
          window.location.href = serverUrl + '/dashboard';
        } else {
          document.querySelector('.error').style.display = 'block';
          document.querySelector('.loader').style.display = 'none';
        }
      };
      xhr.onerror = function() {
        document.querySelector('.error').style.display = 'block';
        document.querySelector('.loader').style.display = 'none';
      };
      xhr.ontimeout = function() {
        document.querySelector('.error').style.display = 'block';
        document.querySelector('.error').textContent = 'Connection timed out. Make sure the FinTrack server is running.';
        document.querySelector('.loader').style.display = 'none';
      };
      xhr.send();
    });
  </script>
</head>
<body>
  <div class="splash">
    <img class="logo" src="/icon-192.png" alt="FinTrack" width="80" height="80">
    <h1>FinTrack</h1>
    <p>Connecting to your financial dashboard…</p>
    <div class="loader"></div>
    <div class="error">
      Could not connect to the server.<br />
      Make sure the FinTrack backend is running.
    </div>
  </div>
</body>
</html>
